name: Deploy to Server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/webapp && git pull origin main
            pip3 install openpyxl --break-system-packages -q 2>/dev/null || pip3 install openpyxl -q
            systemctl restart wayfinder
            sleep 2 && curl -sf http://localhost:8080/health && echo "Health OK"
            echo "Deployed at $(date)"
