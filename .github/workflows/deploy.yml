name: Deploy to Server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Write Google credentials
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            mkdir -p ~/.appdata/cardconv
            cat > ~/.appdata/cardconv/google_credentials.json << 'GCREDS'
            ${{ secrets.GOOGLE_CREDENTIALS }}
            GCREDS
            echo '${{ secrets.CARDCONV_TEMPLATE_B64 }}' | base64 -d > ~/.appdata/cardconv/template.xlsx 2>/dev/null || true
            sed -i "s|ANTHROPIC_API_KEY=.*|ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}|" ~/webapp/.env || true
            grep -q "^GEMINI_API_KEY=" ~/webapp/.env && sed -i "s|^GEMINI_API_KEY=.*|GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}|" ~/webapp/.env || echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> ~/webapp/.env
            grep -q "^GEMINI_OCR_MODEL=" ~/webapp/.env || echo "GEMINI_OCR_MODEL=gemini-2.5-flash" >> ~/webapp/.env

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/webapp && git pull origin main
            pip3 install openpyxl anthropic google-genai google-auth google-auth-oauthlib google-api-python-client fpdf2 Pillow --break-system-packages -q 2>/dev/null || true
            apt-get install -y fonts-nanum 2>/dev/null || true
            systemctl restart wayfinder
            sleep 2 && curl -sf http://localhost:8080/health && echo "Health OK"
            echo "Deployed at $(date)"
