name: Prod Fix Batch Secret

# One-off recovery: the production server (server.py self-loads .env) was missing
# CARDCONV_BATCH_SECRET, so /cardconv/batch/run returned 302 and the daily Drive
# sync was a silent no-op. This appends the key to .env (idempotent), restarts the
# service, and verifies batch/run now authenticates. The daily-sync workflow reads
# the same .env, so both sides share one value.
on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Add batch secret to .env, restart, verify
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/webapp
            if grep -q '^CARDCONV_BATCH_SECRET=' .env; then
              echo "secret already present — leaving as is"
            else
              echo "CARDCONV_BATCH_SECRET=$(python3 -c 'import secrets;print(secrets.token_hex(24))')" >> .env
              echo "secret appended to .env"
            fi
            systemctl restart wayfinder
            sleep 3
            curl -sf http://localhost:8080/health >/dev/null && echo "health OK" || echo "health FAILED"
            secret=$(grep '^CARDCONV_BATCH_SECRET=' .env | cut -d= -f2)
            code=$(curl -s -o /tmp/br.json -w '%{http_code}' -X POST http://localhost:8080/cardconv/batch/run \
              -H "X-Batch-Secret: $secret" -H "Content-Type: application/json" -d '{}')
            echo "batch/run HTTP: $code"
            echo "batch/run body: $(cat /tmp/br.json 2>/dev/null)"
            echo "done at $(date)"
